version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: student-management-mysql
    restart: always
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./restore:/restore
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-management-backend
    restart: always
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    user: "0:0"
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
    command: >
      sh -c "
      chmod -R 777 /app/uploads /app/exports &&
      python main.py
      "

  backup:
    image: mysql:8.0
    container_name: student-management-backup
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./backup:/backup
      - ./db_backups:/db_backups
    entrypoint: >
      sh -c "
      microdnf install -y cronie &&
      chmod +x /backup/backup.sh &&
      chmod 755 /db_backups &&
      crontab /backup/crontab.txt &&
      crond -n
      "

volumes:
  mysql_data: